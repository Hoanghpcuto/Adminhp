<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users HP - Premium Interface</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap');
        body { font-family: 'Lexend', sans-serif; background: #f8f9fa; }
        .search-container { position: sticky; top: 0; z-index: 100; background: rgba(248,249,250,0.8); backdrop-filter: blur(10px); }
        .profile-card { border: none; border-radius: 35px; overflow: hidden; background: white; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); margin-bottom: 20px; }
        .profile-card:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        .avatar-lg { width: 100%; height: 250px; object-fit: cover; }
        .badge-verified { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.9); padding: 5px 15px; border-radius: 20px; font-weight: bold; color: #10b981; font-size: 11px; }
        .nav-bottom { position: fixed; bottom: 15px; left: 15px; right: 15px; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); border-radius: 25px; display: flex; justify-content: space-around; padding: 15px; z-index: 1000; }
        .nav-link { color: #666; }
        .nav-link.active { color: #ff4757; }
    </style>
</head>
<body class="pb-5">

    <div class="search-container p-4">
        <h4 class="fw-800 mb-3">Thành viên mới 🔥</h4>
        <div class="input-group bg-white rounded-pill px-3 shadow-sm border">
            <span class="input-group-text bg-transparent border-0"><i data-lucide="search" class="w-4 h-4"></i></span>
            <input type="text" class="form-control border-0 py-3" placeholder="Tìm người yêu Hải Phòng...">
        </div>
    </div>

    <div class="container px-4 mt-2">
        <div class="profile-card shadow-sm position-relative">
            <span class="badge-verified"><i data-lucide="check-circle" class="w-3 h-3 me-1 d-inline"></i> Đã xác thực</span>
            <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=500&h=700&fit=crop" class="avatar-lg">
            <div class="p-4 bg-white">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h4 class="fw-800 m-0">Hoàng Thu Trang, 24</h4>
                        <p class="text-muted m-0 small">📍 Quận Ngô Quyền • Giáo viên</p>
                    </div>
                    <button class="btn btn-danger rounded-circle p-3 shadow-lg"><i data-lucide="heart"></i></button>
                </div>
                <div class="mt-3 d-flex gap-2">
                    <span class="badge bg-light text-dark rounded-pill px-3 py-2">Du lịch</span>
                    <span class="badge bg-light text-dark rounded-pill px-3 py-2">Nấu ăn</span>
                </div>
            </div>
        </div>

        <div class="profile-card shadow-sm position-relative">
            <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=500&h=700&fit=crop" class="avatar-lg">
            <div class="p-4 bg-white">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h4 class="fw-800 m-0">Quốc Anh, 29</h4>
                        <p class="text-muted m-0 small">📍 Huyện Thủy Nguyên • Kỹ sư</p>
                    </div>
                    <button class="btn btn-dark rounded-circle p-3"><i data-lucide="user-x"></i></button>
                </div>
            </div>
        </div>
    </div>

    <nav class="nav-bottom">
        <a href="index.html" class="nav-link"><i data-lucide="home"></i></a>
        <a href="users.html" class="nav-link active"><i data-lucide="users"></i></a>
        <a href="#" class="nav-link"><i data-lucide="message-circle"></i></a>
        <a href="#" class="nav-link"><i data-lucide="heart"></i></a>
    </nav>

    <script>lucide.createIcons();</script>
</body>
</html>
