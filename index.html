<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - Ghép Đôi Hải Phòng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap');
        :root { --hp-red: #ff4757; --hp-gradient: linear-gradient(135deg, #ff4757 0%, #ff6b81 100%); }
        body { font-family: 'Lexend', sans-serif; background: #f0f2f5; overflow-x: hidden; }
        
        /* Glassmorphism Effect */
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.3); border-radius: 30px; }
        .hero-card { background: var(--hp-gradient); border-radius: 35px; color: white; box-shadow: 0 15px 35px rgba(255, 71, 87, 0.3); }
        
        /* Security Overlay */
        #lock-screen { position: fixed; inset: 0; z-index: 9999; background: #fff; display: flex; align-items: center; justify-content: center; transition: 0.8s cubic-bezier(0.85, 0, 0.15, 1); }
        .nav-bottom { position: fixed; bottom: 15px; left: 15px; right: 15px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-radius: 25px; display: flex; justify-content: space-around; padding: 15px; shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 1000; }
        .nav-link { color: #a1a1a1; transition: 0.3s; }
        .nav-link.active { color: var(--hp-red); transform: translateY(-5px); }
        
        .pulse-red { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(255, 71, 87, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); } }
    </style>
</head>
<body class="pb-5">

    <div id="lock-screen" class="p-4 text-center">
        <div class="animate__animated animate__fadeIn">
            <div class="mb-4 d-inline-block p-4 rounded-circle bg-light pulse-red">
                <i data-lucide="shield-check" class="text-danger w-10 h-10" style="width: 50px; height: 50px;"></i>
            </div>
            <h2 class="fw-800 mb-2">Hệ Thống Admin</h2>
            <p class="text-muted small mb-4">Ghép Đôi Hải Phòng • 2026</p>
            <input type="password" id="sysPass" class="form-control mb-3 text-center rounded-pill py-3 border-0 bg-light shadow-sm" placeholder="Mật khẩu Admin">
            <input type="text" id="sysCode" class="form-control mb-4 text-center rounded-pill py-3 border-0 bg-light shadow-sm fw-bold tracking-widest" placeholder="Mã Cấp 2">
            <button onclick="unlockSystem()" class="btn btn-dark w-100 rounded-pill py-3 fw-bold">Xác Thực Sinh Trắc Học</button>
            <p id="authError" class="text-danger mt-3 small fw-bold d-none">Sai thông tin bảo mật!</p>
        </div>
    </div>

    <div id="dashboard-ui" class="opacity-0 translate-middle-y transition-all">
        <header class="p-4 d-flex justify-content-between align-items-center">
            <div>
                <h6 class="text-muted m-0">Chào Quản trị viên,</h6>
                <h4 class="fw-800">Hải Phòng Dating ⚓</h4>
            </div>
            <div class="dropdown">
                <div class="p-2 bg-white rounded-circle shadow-sm" data-bs-toggle="dropdown">
                    <img src="https://ui-avatars.com/api/?name=Admin+HP&background=ff4757&color=fff" class="rounded-circle" width="40">
                </div>
            </div>
        </header>

        <main class="container px-4">
            <div class="hero-card p-4 mb-4 animate__animated animate__fadeInUp">
                <div class="d-flex justify-content-between">
                    <div>
                        <p class="small m-0 opacity-80 uppercase tracking-widest">Tổng thành viên</p>
                        <h1 class="fw-800 m-0">8,245</h1>
                    </div>
                    <i data-lucide="zap" class="w-8 h-8"></i>
                </div>
                <div class="mt-4 pt-3 border-top border-white/20 d-flex gap-3">
                    <span class="small bg-white/20 px-3 py-1 rounded-pill">Nam: 4,120</span>
                    <span class="small bg-white/20 px-3 py-1 rounded-pill">Nữ: 4,125</span>
                </div>
            </div>

            <div class="glass p-4 mb-4 shadow-sm animate__animated animate__fadeInUp animate__delay-1s">
                <h6 class="fw-bold mb-3 d-flex align-items-center">
                    <i data-lucide="bar-chart-3" class="me-2 text-danger"></i> Tăng trưởng tại Hải Phòng
                </h6>
                <canvas id="growthChart" height="200"></canvas>
            </div>

            <a href="https://www.facebook.com/groups/18FMETkjfg/" class="text-decoration-none">
                <div class="glass p-3 mb-4 d-flex align-items-center shadow-sm border-0 bg-white">
                    <div class="p-3 bg-primary rounded-circle me-3"><i data-lucide="facebook" class="text-white"></i></div>
                    <div class="flex-grow-1">
                        <h6 class="m-0 fw-bold text-dark">Group Hẹn Hò HP</h6>
                        <p class="small text-muted m-0">12 bài đăng mới cần duyệt</p>
                    </div>
                    <i data-lucide="chevron-right" class="text-muted"></i>
                </div>
            </a>
        </main>
    </div>

    <nav class="nav-bottom animate__animated animate__fadeInUp">
        <a href="index.html" class="nav-link active"><i data-lucide="home"></i></a>
        <a href="users.html" class="nav-link"><i data-lucide="users"></i></a>
        <a href="#" class="nav-link"><i data-lucide="message-circle"></i></a>
        <a href="#" class="nav-link"><i data-lucide="heart"></i></a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        lucide.createIcons();

        function unlockSystem() {
            const p = document.getElementById('sysPass').value;
            const c = document.getElementById('sysCode').value;
            if(p === 'Haiphong999@' && c === '123456') {
                const screen = document.getElementById('lock-screen');
                screen.style.transform = 'translateY(-100%)';
                document.getElementById('dashboard-ui').style.opacity = '1';
                initChart();
            } else {
                document.getElementById('authError').classList.remove('d-none');
            }
        }

        function initChart() {
            const ctx = document.getElementById('growthChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['T2', 'T3', 'T4', 'T5', 'T6', 'T7', 'CN'],
                    datasets: [{
                        label: 'Lượt ghép đôi',
                        data: [12, 19, 3, 15, 22, 35, 45],
                        borderColor: '#ff4757',
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(255, 71, 87, 0.1)'
                    }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
            });
        }
    </script>
</body>
</html>
