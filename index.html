<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Future - Ghép Đôi Hải Phòng</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap');
        
        :root {
            --primary-glow: #ff4757;
            --surface: #ffffff;
            --bg-futuristic: #f8fafc;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-futuristic); 
            color: #1e293b;
        }

        /* Hiệu ứng Nút 3D Neumorphism */
        .btn-future {
            background: #f8fafc;
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 6px 6px 12px #e2e8f0, -6px -6px 12px #ffffff;
            border-radius: 20px;
            padding: 15px;
            transition: 0.2s all ease;
            text-align: center;
            text-decoration: none;
            color: #475569;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .btn-future:active {
            box-shadow: inset 4px 4px 8px #e2e8f0, inset -4px -4px 8px #ffffff;
            transform: scale(0.96);
        }

        /* Card Thông số cao cấp */
        .stat-card-pro {
            background: linear-gradient(145deg, #ffffff, #f1f5f9);
            border-radius: 30px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 15px 15px 30px #e2e8f0, -15px -15px 30px #ffffff;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--primary-glow);
        }

        /* Hệ thống thông báo nhấp nháy */
        .live-dot {
            height: 12px; width: 12px;
            background-color: #22c55e;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px #22c55e;
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Menu Bottom Apple Style */
        .dock-nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 35px;
            display: flex; justify-content: space-around;
            padding: 12px; z-index: 2000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .dock-item { color: #94a3b8; text-decoration: none; transition: 0.3s; }
        .dock-item.active { color: #ffffff; transform: translateY(-5px); }
    </style>
</head>

<body class="pb-5">

    <div class="container py-4 mb-5">
        <div class="d-flex justify-content-between align-items-center mb-5 animate__animated animate__fadeIn">
            <div>
                <h2 class="fw-800 m-0">ADMIN HP <span class="live-dot"></span></h2>
                <p class="text-muted small m-0">Hệ thống ghép đôi trực tuyến</p>
            </div>
            <img src="https://ui-avatars.com/api/?name=Hai+Phong&background=ff4757&color=fff" class="rounded-circle shadow" width="50">
        </div>

        <div class="row g-4 mb-5">
            <div class="col-12">
                <div class="stat-card-pro text-center animate__animated animate__zoomIn">
                    <p class="small fw-bold text-uppercase text-muted mb-1">Tổng thành viên Hải Phòng</p>
                    <h1 class="stat-value counter" data-target="8250">0</h1>
                    <div class="progress mt-3" style="height: 6px; border-radius: 10px;">
                        <div class="progress-bar bg-danger w-75 rounded-pill"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="stat-card-pro mb-5 animate__animated animate__fadeInUp">
            <h6 class="fw-bold mb-4 d-flex align-items-center gap-2">
                <i data-lucide="trending-up" class="text-danger"></i> Biểu đồ tăng trưởng thực
            </h6>
            <canvas id="futureChart" height="180"></canvas>
        </div>

        <h5 class="fw-bold mb-4 px-2">Bảng điều khiển chi tiết</h5>
        <div class="row g-4 mb-5 px-1 animate__animated animate__fadeInUp">
            
            <div class="col-4">
                <a href="users.html" class="btn-future">
                    <i data-lucide="user-check" class="text-success"></i>
                    <span style="font-size: 10px; font-weight: 700;">DUYỆT</span>
                </a>
            </div>
            <div class="col-4">
                <a href="#" class="btn-future">
                    <i data-lucide="shield-alert" class="text-danger"></i>
                    <span style="font-size: 10px; font-weight: 700;">KHÓA</span>
                </a>
            </div>
            <div class="col-4">
                <a href="#" class="btn-future">
                    <i data-lucide="message-square" class="text-primary"></i>
                    <span style="font-size: 10px; font-weight: 700;">CHAT</span>
                </a>
            </div>
            <div class="col-4">
                <a href="https://www.facebook.com/groups/18FMETkjfg/" class="btn-future">
                    <i data-lucide="facebook" class="text-info"></i>
                    <span style="font-size: 10px; font-weight: 700;">GROUP</span>
                </a>
            </div>
            <div class="col-4">
                <a href="#" class="btn-future">
                    <i data-lucide="heart" class="text-danger"></i>
                    <span style="font-size: 10px; font-weight: 700;">LOVE</span>
                </a>
            </div>
            <div class="col-4">
                <a href="#" class="btn-future">
                    <i data-lucide="settings-2" class="text-secondary"></i>
                    <span style="font-size: 10px; font-weight: 700;">CẤU HÌNH</span>
                </a>
            </div>

        </div>

        <div class="stat-card-pro p-0 overflow-hidden mb-5">
            <div class="p-3 bg-white border-bottom fw-bold small text-muted">NHẬT KÝ HỆ THỐNG</div>
            <div class="list-group list-group-flush">
                <div class="list-group-item d-flex justify-content-between p-3 border-0">
                    <span class="small">Thành viên mới (Ngô Quyền)</span>
                    <span class="badge bg-light text-dark">+1s trước</span>
                </div>
                <div class="list-group-item d-flex justify-content-between p-3 border-0">
                    <span class="small">Ghép đôi thành công (Đồ Sơn)</span>
                    <span class="badge bg-danger-subtle text-danger">HOT</span>
                </div>
            </div>
        </div>
    </div>

    <nav class="dock-nav">
        <a href="index.html" class="dock-item active"><i data-lucide="component"></i></a>
        <a href="users.html" class="dock-item"><i data-lucide="users"></i></a>
        <a href="#" class="dock-item"><i data-lucide="activity"></i></a>
        <a href="#" class="dock-item"><i data-lucide="user-circle"></i></a>
    </nav>

    <script>
        lucide.createIcons();

        // Hiệu ứng số nhảy
        const counters = document.querySelectorAll('.counter');
        counters.forEach(counter => {
            const update = () => {
                const target = +counter.getAttribute('data-target');
                const count = +counter.innerText;
                const inc = target / 50;
                if (count < target) {
                    counter.innerText = Math.ceil(count + inc);
                    setTimeout(update, 20);
                } else {
                    counter.innerText = target.toLocaleString();
                }
            };
            update();
        });

        // Biểu đồ Future
        const ctx = document.getElementById('futureChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['T2', 'T3', 'T4', 'T5', 'T6', 'T7', 'CN'],
                datasets: [{
                    label: 'Thành viên mới',
                    data: [400, 600, 450, 800, 950, 1200, 1100],
                    backgroundColor: '#ff4757',
                    borderRadius: 10,
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: { 
                    y: { display: false },
                    x: { grid: { display: false }, border: { display: false } }
                }
            }
        });
    </script>
</body>
</html>
